<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YH Portfolio Profile</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>

<body>
  <article class="stage site site--profile" aria-label="プロフィールページ">
    <header class="site__header">
      <div class="brand site__brand">
        <div class="brand-mark site__brand-mark" aria-hidden="true">
          <img src="image/HYlogo.png" alt="" />
        </div>
        <div class="brand-text site__brand-text"><span>Horse</span><span>Yobibit+5</span><span>Studio</span></div>
      </div>
      <nav class="site__nav" aria-label="ページ遷移">
        <a href="profile.html" aria-current="page">プロフィール</a>
        <a href="portfolio.html">ポートフォリオ</a>
        <a href="skills.html">スキル</a>
        <a href="contact.html">お問い合わせ</a>
      </nav>
    </header>

    <main class="main profile-page__main" role="main">
      <div class="donut-area">
        <div class="instruction" id="instruction">
          <pre id="instructionLead">クリックして選択</pre>
          <strong class="instruction-name" id="instructionName">
            <pre>Yobibit</pre>
          </strong>
          <span id="instructionSub">
            <pre>リングからセクションを選んでね</pre>
          </span>
        </div>
        <svg class="donut" viewBox="0 0 440 440" aria-label="セクション メニュー" role="presentation"></svg>
      </div>

      <div class="main-background-dim" id="dim"></div>
      <article class="content-panel" id="panel" aria-live="polite" aria-hidden="true">
        <div>
          <h2 id="panelTitle">セクションタイトル</h2>
          <ul id="panelList"></ul>
          <p id="panelNote"></p>
        </div>
        <button class="close-btn" id="closeBtn">閉じる</button>
      </article>

      <aside class="center-placeholder" aria-hidden="true"></aside>
    </main>

    <footer class="bottom-bar site__footer" aria-label="ボトムバー">
      <nav class="bottom-buttons site__footer-nav" aria-label="Footer Navigation">
        <a class="footer-card site__footer-card is-current" href="profile.html" aria-hidden="true" tabindex="-1">プロフィール
          (Profile)</a>
        <a class="footer-card site__footer-card" href="portfolio.html" aria-hidden="false" tabindex="0">ポートフォリオ
          (Portfolio)</a>
        <a class="footer-card site__footer-card" href="skills.html" aria-hidden="false" tabindex="0">スキル (Skills)</a>
        <a class="footer-card site__footer-card" href="contact.html" aria-hidden="false" tabindex="0">お問い合わせ
          (Contact)</a>
      </nav>
      <div class="footer-meta site__footer-meta">
        <details class="footer-meta-menu site__footer-meta-menu">
          <summary class="footer-menu-toggle site__footer-menu-toggle" aria-label="フッターメニューを開く">
            <span class="footer-menu-icon site__footer-menu-icon"><span></span></span>
          </summary>
          <nav class="footer-menu-panel site__footer-menu-panel" aria-label="Footer quick menu">
            <a class="footer-menu-link site__footer-menu-link is-current" href="profile.html" aria-current="page">プロフィール</a>
            <a class="footer-menu-link site__footer-menu-link" href="portfolio.html">ポートフォリオ</a>
            <a class="footer-menu-link site__footer-menu-link" href="skills.html">スキル</a>
            <a class="footer-menu-link site__footer-menu-link" href="contact.html">お問合せ</a>
          </nav>
        </details>
        <div class="footer-meta-center site__footer-meta-center">
          <p class="copyright">©2026Yobibit</p>
          <a class="footer-meta-link site__footer-meta-link" href="content_editor.html">ポートフォリオ用テキスト入力エディタ</a>
        </div>
      </div>
    </footer>

  </article>

  <script>
    const svg = document.querySelector('.donut');
    const donutArea = document.querySelector('.donut-area');
    const instruction = document.getElementById('instruction');
    const instructionLead = document.getElementById('instructionLead');
    const instructionName = document.getElementById('instructionName');
    const instructionSub = document.getElementById('instructionSub');
    const panel = document.getElementById('panel');
    const panelTitle = document.getElementById('panelTitle');
    const panelList = document.getElementById('panelList');
    const panelNote = document.getElementById('panelNote');
    const closeBtn = document.getElementById('closeBtn');
    const dim = document.getElementById('dim');

    const DATA_URL = 'content.json';
    const DEFAULT_DISPLAY_NAME = 'Yobibit';
    const DEFAULT_SECTIONS = [
      {
        key: '概要',
        title: '概要 / About',
        bullets: ['氏名: 山田太郎 / 29歳 / 東京在住', '希望職種: フロントエンドエンジニア', '3行サマリー: UI/UX志向・迅速な試作・丁寧な運用']
      },
      {
        key: '経歴',
        title: '経歴 / Career',
        bullets: ['製造業: 生産ライン改善に従事 (2年)', '店舗運営: 接客・売場企画を担当 (3年)', '転身: Web開発へシフトし現職でUI改善に従事']
      },
      {
        key: '実績',
        title: '実績 / Works',
        bullets: ['社内ポータルのUI刷新で離脱率20%改善', '受注管理画面のモバイル対応を主導', 'LP A/BテストでCVR+15%']
      },
      {
        key: '強み',
        title: '強み / Strength',
        bullets: ['複雑な要件をビジュアルに整理', 'アクセシビリティ配慮の実装', 'デザイナー/企画との橋渡し']
      },
      {
        key: '学習',
        title: '学習 / Learning',
        bullets: ['TypeScript + ReactでのUI開発', 'SVG/Canvasでのインタラクション設計', '色彩・タイポグラフィ設計を継続学習'],
        note: '資格: 色彩検定2級 / TOEIC780'
      },
      {
        key: '希望',
        title: '希望 / Aspiration',
        bullets: ['入社可能時期: 2024年6月以降', '勤務地: 首都圏 / リモート歓迎', '志向: 長期でUIを育てられる環境を希望'],
        note: '働き方は柔軟に相談可能です。'
      }
    ];
    let displayName = DEFAULT_DISPLAY_NAME;
    let sections = DEFAULT_SECTIONS;

    const colors = ['#ffd9b3', '#ffbe9f', '#ffc79c', '#ffb782', '#ffc499', '#ffcf9f'];
    const activeColor = '#f07c2c';

    const center = { x: 220, y: 220, rOuter: 220, rInner: 144 };

    const polarToCartesian = (cx, cy, r, angleDeg) => {
      const rad = ((angleDeg - 90) * Math.PI) / 180;
      return {
        x: cx + r * Math.cos(rad),
        y: cy + r * Math.sin(rad)
      };
    };

    const describeArc = (cx, cy, r, startAngle, endAngle) => {
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const large = endAngle - startAngle <= 180 ? '0' : '1';
      return ['M', start.x, start.y, 'A', r, r, 0, large, 0, end.x, end.y].join(' ');
    };

    const buildRingPath = (startAngle, endAngle, outer, inner) => {
      const outerArc = describeArc(center.x, center.y, outer, startAngle, endAngle);
      const innerArc = describeArc(center.x, center.y, inner, endAngle, startAngle);
      const startOuter = polarToCartesian(center.x, center.y, outer, endAngle);
      const startInner = polarToCartesian(center.x, center.y, inner, endAngle);
      const endInner = polarToCartesian(center.x, center.y, inner, startAngle);

      return `${outerArc} L ${startInner.x} ${startInner.y} ${innerArc} Z`;
    };

    const createDonut = () => {
      svg.innerHTML = '';
      sections.forEach((section, index) => {
        const start = index * 60;
        const end = start + 60;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', buildRingPath(start, end, center.rOuter, center.rInner));
        path.setAttribute('fill', colors[index % colors.length]);
        path.setAttribute('tabindex', '0');
        path.setAttribute('role', 'button');
        path.setAttribute('aria-label', `${section.key} を開く`);
        path.dataset.key = section.key;
        path.dataset.index = index;
        path.addEventListener('click', () => openPanel(section, path));
        path.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openPanel(section, path);
          }
        });

        const labelAngle = start + 30;
        const labelRadius = (center.rOuter + center.rInner) / 2;
        const pos = polarToCartesian(center.x, center.y, labelRadius, labelAngle);

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', pos.x);
        text.setAttribute('y', pos.y + 5);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', varColor('--text-main'));
        text.setAttribute('font-size', '16');
        text.setAttribute('font-weight', '700');
        text.textContent = section.key;

        svg.appendChild(path);
        svg.appendChild(text);
      });
    };

    const varColor = (name) => getComputedStyle(document.documentElement).getPropertyValue(name);

    function normalizeProfileSections(rawSections) {
      if (!Array.isArray(rawSections)) return null;
      const map = new Map(rawSections.filter(Boolean).map((s) => [s.key, s]));
      return DEFAULT_SECTIONS.map((base, index) => {
        const src = map.get(base.key) || rawSections[index];
        if (!src) return base;
        const rows = Array.isArray(src.rows) ? src.rows : [];
        const bullets = [0, 1, 2].map((i) => {
          const value = rows[i];
          return value && String(value).trim() ? String(value) : base.bullets[i];
        });
        const note = typeof src.note === 'string' && src.note.trim() ? src.note : base.note;
        return { key: base.key, title: base.title, bullets, note };
      });
    }

    function normalizeDisplayName(rawName) {
      if (typeof rawName !== 'string') return DEFAULT_DISPLAY_NAME;
      const normalized = rawName.trim();
      return normalized || DEFAULT_DISPLAY_NAME;
    }

    function renderDisplayName() {
      instructionName.querySelector('pre').textContent = displayName;
    }

    async function loadProfileData() {
      try {
        const res = await fetch(DATA_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load content.json');
        const data = await res.json();
        displayName = normalizeDisplayName(data?.profile?.displayName);
        const normalized = normalizeProfileSections(data?.profile?.sections);
        if (normalized) sections = normalized;
      } catch (e) {
        displayName = DEFAULT_DISPLAY_NAME;
        sections = DEFAULT_SECTIONS;
      }
    }

    let activePath = null;

    const openPanel = (section, pathEl) => {
      panelTitle.textContent = section.title;
      panelList.innerHTML = '';
      section.bullets.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        panelList.appendChild(li);
      });
      panelNote.textContent = section.note || '補足メモ: 必要に応じて差し替えてください。';

      if (activePath && activePath !== pathEl) {
        activePath.setAttribute('fill', colors[activePath.dataset.index]);
      }
      pathEl.setAttribute('fill', activeColor);
      activePath = pathEl;

      instruction.style.opacity = '0';
      instruction.style.transform = 'scale(0.9)';

      panel.setAttribute('aria-hidden', 'false');
      panel.classList.add('active');
      dim.classList.add('visible');
    };

    const closePanel = () => {
      if (activePath) {
        activePath.setAttribute('fill', colors[activePath.dataset.index]);
      }
      activePath = null;
      panel.classList.remove('active');
      panel.setAttribute('aria-hidden', 'true');
      dim.classList.remove('visible');
      instruction.style.opacity = '1';
      instruction.style.transform = 'scale(1)';
    };

    closeBtn.addEventListener('click', closePanel);
    dim.addEventListener('click', closePanel);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closePanel();
      }
    });

    const fitDonutToMain = () => {
      const rect = donutArea.getBoundingClientRect();
      const availableWidth = Math.max(0, rect.width - 12);
      const availableHeight = Math.max(0, rect.height - 12);
      const side = Math.floor(Math.min(availableWidth, availableHeight));
      if (side <= 0) return;

      // Always keep the donut inside the main area.
      donutArea.style.setProperty('--donut-size', `${side}px`);

      // Center helper circle tracks donut size and never exceeds it.
      const instructionSize = Math.min(Math.floor(side * 0.6), Math.max(72, Math.floor(side * 0.4)));
      donutArea.style.setProperty('--instruction-size', `${Math.min(instructionSize, side)}px`);
      let titleSize = Math.max(8, Math.min(24, Math.floor(instructionSize * 0.16)));
      let nameSize = Math.max(10, Math.min(28, Math.floor(instructionSize * 0.19)));
      let subSize = Math.max(6, Math.min(16, Math.floor(instructionSize * 0.11)));
      let gapSize = Math.max(1, Math.min(8, Math.floor(instructionSize * 0.05)));
      let hideLead = side <= 280;
      const applyInstructionTypography = () => {
        donutArea.style.setProperty('--instruction-title-size', `${titleSize}px`);
        donutArea.style.setProperty('--instruction-name-size', `${nameSize}px`);
        donutArea.style.setProperty('--instruction-sub-size', `${subSize}px`);
        donutArea.style.setProperty('--instruction-gap', `${gapSize}px`);
        instructionLead.hidden = hideLead;
      };

      applyInstructionTypography();

      // Guarantee text stays inside the center circle at small sizes.
      let guard = 0;
      while (
        guard < 20 &&
        (instruction.scrollHeight > instruction.clientHeight || instruction.scrollWidth > instruction.clientWidth)
      ) {
        if (subSize > 5) {
          subSize -= 1;
        } else if (!hideLead) {
          hideLead = true;
        } else if (titleSize > 7) {
          titleSize -= 1;
        } else if (gapSize > 0) {
          gapSize -= 1;
        } else if (nameSize > 8) {
          nameSize -= 1;
        } else {
          break;
        }
        applyInstructionTypography();
        guard += 1;
      }
    };

    async function init() {
      await loadProfileData();
      renderDisplayName();
      createDonut();
      fitDonutToMain();
    }

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => fitDonutToMain());
      ro.observe(donutArea);
      ro.observe(document.querySelector('.main'));
    }

    window.addEventListener('resize', fitDonutToMain);
    window.addEventListener('orientationchange', fitDonutToMain);

    init();
  </script>
</body>

</html>
