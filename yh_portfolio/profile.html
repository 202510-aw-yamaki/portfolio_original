<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YH Portfolio Profile</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>
  <div class="stage" aria-label="プロフィールページ">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="image/HYlogo.png" alt="" />
        </div>
        <div class="brand-text"><span>Horse</span><span>Yobibit+5 Studio</span></div>
      </div>
      <nav aria-label="ページ遷移">
        <a href="profile.html" aria-current="page">プロフィール</a>
        <a href="portfolio.html">ポートフォリオ</a>
        <a href="skills.html">スキル</a>
        <a href="contact.html">お問い合わせ</a>
      </nav>
    </header>

    <div class="main" role="main">
      <div class="donut-area">
        <div class="instruction" id="instruction">
          <strong>クリックして選択</strong>
          <span>左のリングからセクションを選んでください</span>
        </div>
        <svg class="donut" viewBox="0 0 440 440" aria-label="セクション メニュー" role="presentation"></svg>
      </div>

      <div class="main-background-dim" id="dim"></div>
      <article class="content-panel" id="panel" aria-live="polite" aria-hidden="true">
        <div>
          <h2 id="panelTitle">セクションタイトル</h2>
          <ul id="panelList"></ul>
          <p id="panelNote"></p>
        </div>
        <button class="close-btn" id="closeBtn">閉じる</button>
      </article>

      <div class="center-placeholder" aria-hidden="true"></div>
    </div>

        <footer class="bottom-bar" aria-label="ボトムバー">
      <div class="bottom-buttons">
        <a class="footer-card is-current" href="profile.html" aria-hidden="true" tabindex="-1">プロフィール (Profile)</a>
        <a class="footer-card" href="portfolio.html" aria-hidden="false" tabindex="0">ポートフォリオ (Portfolio)</a>
        <a class="footer-card" href="skills.html" aria-hidden="false" tabindex="0">スキル (Skills)</a>
        <a class="footer-card" href="contact.html" aria-hidden="false" tabindex="0">お問い合わせ (Contact)</a>
      </div>
    </footer>

  </div>

  <script>
    const svg = document.querySelector('.donut');
    const instruction = document.getElementById('instruction');
    const panel = document.getElementById('panel');
    const panelTitle = document.getElementById('panelTitle');
    const panelList = document.getElementById('panelList');
    const panelNote = document.getElementById('panelNote');
    const closeBtn = document.getElementById('closeBtn');
    const dim = document.getElementById('dim');

    const sections = [
      {
        key: '概要',
        title: '概要 / About',
        bullets: ['氏名: 山田太郎 / 29歳 / 東京在住', '希望職種: フロントエンドエンジニア', '3行サマリー: UI/UX志向・迅速な試作・丁寧な運用']
      },
      {
        key: '経歴',
        title: '経歴 / Career',
        bullets: ['製造業: 生産ライン改善に従事 (2年)', '店舗運営: 接客・売場企画を担当 (3年)', '転身: Web開発へシフトし現職でUI改善に従事']
      },
      {
        key: '実績',
        title: '実績 / Works',
        bullets: ['社内ポータルのUI刷新で離脱率20%改善', '受注管理画面のモバイル対応を主導', 'LP A/BテストでCVR+15%']
      },
      {
        key: '強み',
        title: '強み / Strength',
        bullets: ['複雑な要件をビジュアルに整理', 'アクセシビリティ配慮の実装', 'デザイナー/企画との橋渡し']
      },
      {
        key: '学習',
        title: '学習 / Learning',
        bullets: ['TypeScript + ReactでのUI開発', 'SVG/Canvasでのインタラクション設計', '色彩・タイポグラフィ設計を継続学習'],
        note: '資格: 色彩検定2級 / TOEIC780'
      },
      {
        key: '希望',
        title: '希望 / Aspiration',
        bullets: ['入社可能時期: 2024年6月以降', '勤務地: 首都圏 / リモート歓迎', '志向: 長期でUIを育てられる環境を希望'],
        note: '働き方は柔軟に相談可能です。'
      }
    ];

    const colors = ['#ffd9b3', '#ffbe9f', '#ffc79c', '#ffb782', '#ffc499', '#ffcf9f'];
    const activeColor = '#f07c2c';

    const center = { x: 220, y: 220, rOuter: 220, rInner: 144 };

    const polarToCartesian = (cx, cy, r, angleDeg) => {
      const rad = ((angleDeg - 90) * Math.PI) / 180;
      return {
        x: cx + r * Math.cos(rad),
        y: cy + r * Math.sin(rad)
      };
    };

    const describeArc = (cx, cy, r, startAngle, endAngle) => {
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const large = endAngle - startAngle <= 180 ? '0' : '1';
      return ['M', start.x, start.y, 'A', r, r, 0, large, 0, end.x, end.y].join(' ');
    };

    const buildRingPath = (startAngle, endAngle, outer, inner) => {
      const outerArc = describeArc(center.x, center.y, outer, startAngle, endAngle);
      const innerArc = describeArc(center.x, center.y, inner, endAngle, startAngle);
      const startOuter = polarToCartesian(center.x, center.y, outer, endAngle);
      const startInner = polarToCartesian(center.x, center.y, inner, endAngle);
      const endInner = polarToCartesian(center.x, center.y, inner, startAngle);

      return `${outerArc} L ${startInner.x} ${startInner.y} ${innerArc} Z`;
    };

    const createDonut = () => {
      sections.forEach((section, index) => {
        const start = index * 60;
        const end = start + 60;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', buildRingPath(start, end, center.rOuter, center.rInner));
        path.setAttribute('fill', colors[index % colors.length]);
        path.setAttribute('tabindex', '0');
        path.setAttribute('role', 'button');
        path.setAttribute('aria-label', `${section.key} を開く`);
        path.dataset.key = section.key;
        path.dataset.index = index;
        path.addEventListener('click', () => openPanel(section, path));
        path.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openPanel(section, path);
          }
        });

        const labelAngle = start + 30;
        const labelRadius = (center.rOuter + center.rInner) / 2;
        const pos = polarToCartesian(center.x, center.y, labelRadius, labelAngle);

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', pos.x);
        text.setAttribute('y', pos.y + 5);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', varColor('--text-main'));
        text.setAttribute('font-size', '16');
        text.setAttribute('font-weight', '700');
        text.textContent = section.key;

        svg.appendChild(path);
        svg.appendChild(text);
      });
    };

    const varColor = (name) => getComputedStyle(document.documentElement).getPropertyValue(name);

    let activePath = null;

    const openPanel = (section, pathEl) => {
      panelTitle.textContent = section.title;
      panelList.innerHTML = '';
      section.bullets.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        panelList.appendChild(li);
      });
      panelNote.textContent = section.note || '補足メモ: 必要に応じて差し替えてください。';

      if (activePath && activePath !== pathEl) {
        activePath.setAttribute('fill', colors[activePath.dataset.index]);
      }
      pathEl.setAttribute('fill', activeColor);
      activePath = pathEl;

      instruction.style.opacity = '0';
      instruction.style.transform = 'scale(0.9)';

      panel.setAttribute('aria-hidden', 'false');
      panel.classList.add('active');
      dim.classList.add('visible');
    };

    const closePanel = () => {
      if (activePath) {
        activePath.setAttribute('fill', colors[activePath.dataset.index]);
      }
      activePath = null;
      panel.classList.remove('active');
      panel.setAttribute('aria-hidden', 'true');
      dim.classList.remove('visible');
      instruction.style.opacity = '1';
      instruction.style.transform = 'scale(1)';
    };

    closeBtn.addEventListener('click', closePanel);
    dim.addEventListener('click', closePanel);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closePanel();
      }
    });

    createDonut();
  </script>
</body>
</html>
