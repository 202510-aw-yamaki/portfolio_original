<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YH Portfolio - ポートフォリオ</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/portfolio.css" />
</head>
<body>
  <article class="stage site site--portfolio" aria-label="ポートフォリオページ">
    <header class="site__header">
      <div class="brand site__brand">
        <div class="brand-mark site__brand-mark" aria-hidden="true">
          <img src="image/HYlogo.png" alt="" />
        </div>
        <div class="brand-text site__brand-text"><span>Horse</span><span>Yobibit+5</span><span>Studio</span></div>
      </div>
      <nav class="site__nav" aria-label="ページ遷移">
        <a href="profile.html">プロフィール</a>
        <a href="portfolio.html" aria-current="page">ポートフォリオ</a>
        <a href="skills.html">スキル</a>
        <a href="contact.html">お問い合わせ</a>
      </nav>
    </header>

    <main class="main portfolio-page__main" role="main">
      <section class="book-area" aria-label="ポートフォリオ本">
        <div class="book" id="book" data-state="cover">
          <button class="bookmark" id="bookmarkBtn" type="button" aria-label="一覧を開く">一覧へ</button>

          <div class="cover" id="cover" role="group" aria-label="表紙">
            <div class="cover-title">
              <h1>PORTFOLIO</h1>
              <div class="subtitle">表紙 / 注目作品</div>
            </div>

            <div class="featured-list" id="featuredList" aria-label="注目3作品">
            </div>

            <div class="cover-hint" aria-hidden="true">
              <span>作品を選択すると詳細へ移動します</span>
            </div>
          </div>

          <div class="pages" aria-label="見開きページ">
            <div class="spine" aria-hidden="true"></div>

            <div class="page" role="group" aria-label="左ページ">
              <div class="page-header">
                <h2 id="leftTitle">見開き一覧</h2>
                <button class="mini-btn" id="toCoverBtn" type="button" aria-label="表紙へ戻る">表紙へ戻る</button>
              </div>
              <div id="spreadLeft"></div>
            </div>

            <div class="page" role="group" aria-label="右ページ">
              <div class="page-header">
                <h2 id="rightTitle">状態説明</h2>
                <button class="mini-btn" id="toSpreadBtn" type="button" aria-label="一覧へ戻る">一覧へ戻る</button>
              </div>
              <div id="spreadRight"></div>
            </div>

            <div class="book-pagination" id="bookPagination" aria-live="polite"></div>
          </div>
        </div>
      </section>
      <aside class="center-placeholder" aria-hidden="true"></aside>
    </main>

    <footer class="site__footer" aria-label="ボトムバー">
      <nav class="site__footer-nav" aria-label="Footer Navigation">
        <a class="site__footer-card" href="profile.html" aria-hidden="false" tabindex="0">プロフィール (Profile)</a>
        <a class="site__footer-card is-current" href="portfolio.html" aria-hidden="true" tabindex="-1">ポートフォリオ (Portfolio)</a>
        <a class="site__footer-card" href="skills.html" aria-hidden="false" tabindex="0">スキル (Skills)</a>
        <a class="site__footer-card" href="contact.html" aria-hidden="false" tabindex="0">お問い合わせ (Contact)</a>
      </nav>
      <div class="site__footer-meta">
        <details class="site__footer-meta-menu">
          <summary class="site__footer-menu-toggle" aria-label="フッターメニューを開く">
            <span class="site__footer-menu-icon"><span></span></span>
          </summary>
          <nav class="site__footer-menu-panel" aria-label="Footer quick menu">
            <a class="site__footer-menu-link" href="profile.html">プロフィール</a>
            <a class="site__footer-menu-link is-current" href="portfolio.html" aria-current="page">ポートフォリオ</a>
            <a class="site__footer-menu-link" href="skills.html">スキル</a>
            <a class="site__footer-menu-link" href="contact.html">お問合せ</a>
          </nav>
        </details>
        <div class="site__footer-meta-center">
          <p class="copyright">©2026Yobibit</p>
          <a class="site__footer-meta-link" href="content_editor.html">ポートフォリオ用テキスト入力エディタ</a>
        </div>
      </div>
    </footer>
  </article>

  <script>
    const book = document.getElementById('book');
    const featuredList = document.getElementById('featuredList');
    const coverEl = document.getElementById('cover');
    const spreadLeft = document.getElementById('spreadLeft');
    const spreadRight = document.getElementById('spreadRight');
    const pagesEl = document.querySelector('.pages');
    const bookPagination = document.getElementById('bookPagination');
    const leftTitle = document.getElementById('leftTitle');
    const rightTitle = document.getElementById('rightTitle');
    const reduceMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

    const bookmarkBtn = document.getElementById('bookmarkBtn');
    const toCoverBtn = document.getElementById('toCoverBtn');
    const toSpreadBtn = document.getElementById('toSpreadBtn');
    const leftHeader = spreadLeft.parentElement.querySelector('.page-header');
    const rightHeader = spreadRight.parentElement.querySelector('.page-header');

    const DATA_URL = 'content.json';
    const DEFAULT_WORKS = [
      {
        id: 'work-01',
        title: '作品A（仮）',
        short: 'UI改善を中心に、導線整理と視認性向上を行った事例です。',
        tags: ['UI', '設計'],
        detail: '背景・課題\n- 複数導線で離脱率が高い状態\n\n対応\n- 画面構成の再設計\n- 操作導線を2ステップに集約\n\n結果\n- 初回操作完了率が向上',
        pageUrl: '',
        downloadUrl: ''
      },
      {
        id: 'work-02',
        title: '作品B（仮）',
        short: '管理画面のモバイル最適化を行い、現場運用負荷を低減しました。',
        tags: ['Web', '実装'],
        detail: '背景・課題\n- PC前提UIでスマホ運用が困難\n\n対応\n- ブレークポイント再設計\n- 優先操作の常時表示\n\n結果\n- モバイル操作時間を短縮',
        pageUrl: '',
        downloadUrl: ''
      },
      {
        id: 'work-03',
        title: '作品C（仮）',
        short: '情報量の多い画面を整理し、意思決定しやすいUIに改善しました。',
        tags: ['業務', '分析'],
        detail: '背景・課題\n- 一画面の情報が多く判断しづらい\n\n対応\n- 情報階層の定義\n- 重要情報を上段固定\n\n結果\n- 判断時間を短縮',
        pageUrl: '',
        downloadUrl: ''
      },
      {
        id: 'work-04',
        title: '作品D（仮）',
        short: 'デザインシステム導入に向けたコンポーネント整備を実施しました。',
        tags: ['UI', '標準化'],
        detail: '背景・課題\n- 画面ごとに部品仕様が不統一\n\n対応\n- 共通部品ルール策定\n- 実装規約整備\n\n結果\n- 開発とレビューの速度向上',
        pageUrl: '',
        downloadUrl: ''
      },
      {
        id: 'work-05',
        title: '作品E（仮）',
        short: 'フォーム導線の見直しで入力完了率を改善した事例です。',
        tags: ['Web', 'CV改善'],
        detail: '背景・課題\n- 入力途中離脱が多い\n\n対応\n- 入力項目の削減\n- エラー表示の即時化\n\n結果\n- 完了率改善',
        pageUrl: '',
        downloadUrl: ''
      },
      {
        id: 'work-06',
        title: '作品F（仮）',
        short: '運用チーム向けに手順を整理し、更新作業の属人化を解消しました。',
        tags: ['運用', '改善'],
        detail: '背景・課題\n- 担当者依存で更新品質にばらつき\n\n対応\n- 手順書整備\n- テンプレート化\n\n結果\n- 作業品質の安定化',
        pageUrl: '',
        downloadUrl: ''
      }
    ];

    const DEFAULT_FEATURED = ['work-01', 'work-02', 'work-03'];
    let works = DEFAULT_WORKS.map((w) => ({ ...w, tags: [...w.tags] }));
    let featured = DEFAULT_FEATURED.slice();
    const mobileQuery = window.matchMedia('(max-width: 767px)');
    const tabletQuery = window.matchMedia('(min-width: 768px) and (max-width: 1023px)');
    let spreadPageIndex = 0;
    let currentDetailIndex = -1;

    function normalizeWorks(list) {
      if (!Array.isArray(list)) return null;
      const normalized = list
        .filter((w) => w && (w.title || w.short || w.detail || (w.tags && w.tags.length)))
        .map((w, index) => {
          const id = typeof w.id === 'string' && w.id.trim()
            ? w.id.trim()
            : `work-${String(index + 1).padStart(2, '0')}`;
          const tags = Array.isArray(w.tags)
            ? w.tags.map((t) => String(t)).filter((t) => t.trim())
            : [];
          return {
            id,
            title: w.title ? String(w.title) : '',
            short: w.short ? String(w.short) : '',
            tags,
            detail: w.detail ? String(w.detail) : '',
            pageUrl: w.pageUrl ? String(w.pageUrl) : '',
            downloadUrl: w.downloadUrl ? String(w.downloadUrl) : ''
          };
        });
      return normalized.length ? normalized : null;
    }

    function normalizeFeatured(ids, list) {
      if (!Array.isArray(ids) || ids.length === 0) {
        return list.slice(0, 3).map((w) => w.id);
      }
      const set = new Set(list.map((w) => w.id));
      const filtered = Array.from(new Set(ids.filter((id) => set.has(id))));
      return filtered.length ? filtered : list.slice(0, 3).map((w) => w.id);
    }

    async function loadPortfolioData() {
      try {
        const res = await fetch(DATA_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load content.json');
        const data = await res.json();
        const normalizedWorks = normalizeWorks(data?.portfolio?.works);
        if (normalizedWorks) {
          works = normalizedWorks;
          featured = normalizeFeatured(data?.portfolio?.featured, works);
        } else {
          works = DEFAULT_WORKS.map((w) => ({ ...w, tags: [...w.tags] }));
          featured = DEFAULT_FEATURED.slice();
        }
      } catch (e) {
        works = DEFAULT_WORKS.map((w) => ({ ...w, tags: [...w.tags] }));
        featured = DEFAULT_FEATURED.slice();
      }
    }

    function getFeaturedIds() {
      return mobileQuery.matches ? featured.slice(0, 2) : featured;
    }

    function getSpreadConfig() {
      if (mobileQuery.matches) {
        return { mode: 'mobile', perPage: 2, leftCount: 1, rightCount: 1 };
      }
      if (tabletQuery.matches) {
        return { mode: 'tablet', perPage: 4, leftCount: 2, rightCount: 2 };
      }
      return { mode: 'pc', perPage: 6, leftCount: 3, rightCount: 3 };
    }

    function placeHeaderButtons(mode) {
      if (mode === 'detail') {
        if (toSpreadBtn.parentElement !== leftHeader) leftHeader.appendChild(toSpreadBtn);
        if (toCoverBtn.parentElement !== rightHeader) rightHeader.appendChild(toCoverBtn);
        toSpreadBtn.style.visibility = 'visible';
        toCoverBtn.style.visibility = 'visible';
        return;
      }
      if (toCoverBtn.parentElement !== leftHeader) leftHeader.appendChild(toCoverBtn);
      if (toSpreadBtn.parentElement !== rightHeader) rightHeader.appendChild(toSpreadBtn);
      toCoverBtn.style.visibility = 'visible';
      toSpreadBtn.style.visibility = 'hidden';
    }

    function setState(next) {
      book.setAttribute('data-state', next);
    }

    function turnAnimation(fn, kind = 'cover', dir = 'next') {
      const coverDur = 1200;
      const innerDur = 1200;
      const isInner = kind === 'inner';
      const cls = isInner ? 'is-page-turning' : 'is-turning';
      const dur = isInner ? innerDur : coverDur;
      const switchDelay = 560;

      book.classList.remove('is-turning', 'is-page-turning');
      book.setAttribute('data-turn-dir', dir === 'prev' ? 'prev' : 'next');
      void book.offsetWidth;
      book.classList.add(cls);

      window.setTimeout(() => {
        fn();
        window.setTimeout(() => {
          book.classList.remove(cls);
          book.removeAttribute('data-turn-dir');
        }, dur + 60);
      }, switchDelay);
    }

    function renderCover() {
      setState('cover');
      book.removeAttribute('data-spread-mode');
      placeHeaderButtons('default');
      toSpreadBtn.style.visibility = 'hidden';
      bookPagination.innerHTML = '';
      featuredList.innerHTML = '';

      getFeaturedIds().forEach((id) => {
        const w = works.find((x) => x.id === id);
        if (!w) return;
        const row = document.createElement('div');
        row.className = 'featured-item';
        row.setAttribute('role', 'button');
        row.setAttribute('tabindex', '0');
        row.innerHTML = `<div class="title">${escapeHtml(w.title)}</div><div class="desc">${escapeHtml(w.short)}</div>`;
        row.addEventListener('click', () => turnAnimation(() => renderDetail(w.id), 'cover'));
        row.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            turnAnimation(() => renderDetail(w.id), 'cover');
          }
        });
        featuredList.appendChild(row);
      });

      leftTitle.textContent = '見開き一覧';
      rightTitle.textContent = '状態説明';
      spreadLeft.innerHTML = '';
      spreadRight.innerHTML = `
        <div class="detail">
          <p>表紙では注目3作品を表示します。作品を選択すると詳細へ移動します。</p>
          <p>「一覧へ」ボタンを押すと、見開き一覧（最大6作品）に遷移します。</p>
        </div>
      `;
    }

    function renderSpread() {
      setState('spread');
      const config = getSpreadConfig();
      book.setAttribute('data-spread-mode', config.mode);
      placeHeaderButtons('default');
      toSpreadBtn.style.visibility = 'hidden';

      const totalPages = Math.max(1, Math.ceil(works.length / config.perPage));
      spreadPageIndex = Math.min(spreadPageIndex, totalPages - 1);
      const start = spreadPageIndex * config.perPage;
      const list = works.slice(start, start + config.perPage);
      const leftItems = list.slice(0, config.leftCount);
      const rightItems = list.slice(config.leftCount, config.leftCount + config.rightCount);
      const pager = spreadPaginationHtml(spreadPageIndex, totalPages);

      leftTitle.textContent = '見開き一覧';
      rightTitle.textContent = '見開き一覧';

      spreadLeft.innerHTML = `
        <div class="spread-list" aria-label="Left works list">${leftItems.map((w) => spreadItemHtml(w)).join('')}</div>
      `;
      spreadRight.innerHTML = `
        <div class="spread-list" aria-label="Right works list">${rightItems.map((w) => spreadItemHtml(w)).join('')}</div>
      `;
      bookPagination.innerHTML = pager;

      bindSpreadItems(spreadLeft);
      bindSpreadItems(spreadRight);
      bindSpreadPagination(bookPagination);
    }

    function spreadItemHtml(w) {
      return `
        <div class="spread-item" role="button" tabindex="0" data-id="${w.id}">
          <div class="title">${escapeHtml(w.title)}</div>
          <div class="desc">${escapeHtml(w.short)}</div>
          <div class="chips" aria-label="タグ">${w.tags.slice(0, 2).map((t) => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
        </div>
      `;
    }

    function bindSpreadItems(root) {
      root.querySelectorAll('[data-id]').forEach((el) => {
        const id = el.getAttribute('data-id');
        el.addEventListener('click', () => turnAnimation(() => renderDetail(id), 'inner'));
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            turnAnimation(() => renderDetail(id), 'inner');
          }
        });
      });
    }

    function spreadPaginationHtml(currentIndex, totalPages) {
      if (totalPages <= 1) return '';
      const page = currentIndex + 1;
      return `
        <nav class="spread-pagination" aria-label="Works pagination">
          <button class="page-nav" type="button" data-page-action="prev" ${currentIndex === 0 ? 'disabled' : ''}>Prev</button>
          <span class="page-indicator">${page} / ${totalPages}</span>
          <button class="page-nav" type="button" data-page-action="next" ${currentIndex >= totalPages - 1 ? 'disabled' : ''}>Next</button>
        </nav>
      `;
    }

    function bindSpreadPagination(root) {
      root.querySelectorAll('[data-page-action]').forEach((el) => {
        el.addEventListener('click', () => {
          const action = el.getAttribute('data-page-action');
          const config = getSpreadConfig();
          const totalPages = Math.max(1, Math.ceil(works.length / config.perPage));
          const nextIndex = action === 'next' ? spreadPageIndex + 1 : spreadPageIndex - 1;
          if (nextIndex < 0 || nextIndex >= totalPages) return;
          spreadPageIndex = nextIndex;
          turnAnimation(renderSpread, 'inner', action === 'next' ? 'next' : 'prev');
        });
      });
    }

    function detailPaginationHtml(index) {
      if (index < 0 || index >= works.length) return '';
      const prevDisabled = index === 0 ? 'disabled' : '';
      const nextDisabled = index === works.length - 1 ? 'disabled' : '';
      return `
        <nav class="spread-pagination detail-pagination" aria-label="作品詳細ページ移動">
          <button class="page-nav" type="button" data-detail-action="prev" ${prevDisabled}>前へ</button>
          <span class="page-indicator">${escapeHtml(works[index].title)}</span>
          <button class="page-nav" type="button" data-detail-action="next" ${nextDisabled}>次へ</button>
        </nav>
      `;
    }

    function bindDetailPagination() {
      document.querySelectorAll('[data-detail-action]').forEach((el) => {
        el.addEventListener('click', () => {
          const action = el.getAttribute('data-detail-action');
          const nextIndex = action === 'next' ? currentDetailIndex + 1 : currentDetailIndex - 1;
          if (nextIndex < 0 || nextIndex >= works.length) return;
          currentDetailIndex = nextIndex;
          turnAnimation(() => renderDetailByIndex(nextIndex), 'inner', action === 'next' ? 'next' : 'prev');
        });
      });
    }

    function renderDetailByIndex(index) {
      if (index < 0 || index >= works.length) return;
      renderDetail(works[index].id);
    }

    function renderDetail(workId) {
      const w = works.find((x) => x.id === workId);
      if (!w) return;
      currentDetailIndex = works.findIndex((x) => x.id === workId);
      setState('detail');
      book.removeAttribute('data-spread-mode');
      placeHeaderButtons('detail');
      toSpreadBtn.style.visibility = 'visible';

      leftTitle.textContent = '作品情報とリンク';
      rightTitle.textContent = '詳細説明';

      const pageLink = w.pageUrl
        ? `<a class="nav-button" href="${w.pageUrl}">作品ページへ</a>`
        : `<div class="ghost-link">作品ページURL未設定<span>後工程で設定</span></div>`;
      const downloadLink = w.downloadUrl
        ? `<a class="nav-button" href="${w.downloadUrl}">ダウンロード</a>`
        : `<div class="ghost-link">ダウンロードURL未設定<span>後工程で設定</span></div>`;

      spreadLeft.innerHTML = `
        <div class="detail" aria-label="作品情報">
          <h3>${escapeHtml(w.title)}</h3>
          <div class="chips" aria-label="タグ">${w.tags.map((t) => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>
          <p>${escapeHtml(w.short)}</p>
          <h3>リンク</h3>
          <div class="link-list">${pageLink}${downloadLink}</div>
        </div>
      `;

      spreadRight.innerHTML = `
        <div class="detail" aria-label="作品詳細">
          <h3>詳細</h3>
          <p>${escapeHtml(w.detail)}</p>
        </div>
      `;
      bookPagination.innerHTML = detailPaginationHtml(currentDetailIndex);
      bindDetailPagination();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    bookmarkBtn.addEventListener('click', () => {
      const st = book.getAttribute('data-state');
      if (st === 'cover') spreadPageIndex = 0;
      turnAnimation(renderSpread, st === 'cover' ? 'cover' : 'inner');
    });
    toCoverBtn.addEventListener('click', () => turnAnimation(renderCover, 'cover'));
    toSpreadBtn.addEventListener('click', () => turnAnimation(renderSpread, 'inner'));

    function rerenderByViewport() {
      const state = book.getAttribute('data-state');
      if (state === 'cover') renderCover();
      if (state === 'spread') renderSpread();
    }

    function canSwipeNow() {
      return mobileQuery.matches && !book.classList.contains('is-turning') && !book.classList.contains('is-page-turning');
    }

    function handleMobileSwipe(direction) {
      if (!canSwipeNow()) return;
      const state = book.getAttribute('data-state');

      if (state === 'detail') {
        const nextIndex = direction === 'next' ? currentDetailIndex + 1 : currentDetailIndex - 1;
        if (nextIndex < 0 || nextIndex >= works.length) return;
        currentDetailIndex = nextIndex;
        turnAnimation(() => renderDetailByIndex(nextIndex), 'inner', direction);
        return;
      }

      if (state === 'spread') {
        const config = getSpreadConfig();
        const totalPages = Math.max(1, Math.ceil(works.length / config.perPage));
        const nextIndex = direction === 'next' ? spreadPageIndex + 1 : spreadPageIndex - 1;
        if (nextIndex < 0 || nextIndex >= totalPages) return;
        spreadPageIndex = nextIndex;
        turnAnimation(renderSpread, 'inner', direction);
      }
    }

    let touchTracking = false;
    let touchLockHorizontal = false;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchCurrentX = 0;

    function resetTouchSwipe() {
      touchTracking = false;
      touchLockHorizontal = false;
      touchStartX = 0;
      touchStartY = 0;
      touchCurrentX = 0;
    }

    pagesEl.addEventListener('touchstart', (e) => {
      if (!mobileQuery.matches || e.touches.length !== 1) return;
      const t = e.touches[0];
      touchTracking = true;
      touchLockHorizontal = false;
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchCurrentX = t.clientX;
    }, { passive: true });

    pagesEl.addEventListener('touchmove', (e) => {
      if (!touchTracking || e.touches.length !== 1) return;
      const t = e.touches[0];
      touchCurrentX = t.clientX;
      const dx = touchCurrentX - touchStartX;
      const dy = t.clientY - touchStartY;

      if (!touchLockHorizontal) {
        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
        if (Math.abs(dy) >= Math.abs(dx)) {
          touchTracking = false;
          return;
        }
        touchLockHorizontal = true;
      }

      if (touchLockHorizontal && e.cancelable) e.preventDefault();
    }, { passive: false });

    pagesEl.addEventListener('touchend', () => {
      if (!touchTracking || !touchLockHorizontal) {
        resetTouchSwipe();
        return;
      }
      const dx = touchCurrentX - touchStartX;
      if (Math.abs(dx) < 40) {
        resetTouchSwipe();
        return;
      }
      handleMobileSwipe(dx < 0 ? 'next' : 'prev');
      resetTouchSwipe();
    }, { passive: true });

    pagesEl.addEventListener('touchcancel', resetTouchSwipe, { passive: true });

    let coverTouchTracking = false;
    let coverTouchStartX = 0;
    let coverTouchStartY = 0;

    coverEl.addEventListener('touchstart', (e) => {
      if (!mobileQuery.matches || e.touches.length !== 1) return;
      if (book.getAttribute('data-state') !== 'cover') return;
      const t = e.touches[0];
      coverTouchTracking = true;
      coverTouchStartX = t.clientX;
      coverTouchStartY = t.clientY;
    }, { passive: true });

    coverEl.addEventListener('touchmove', (e) => {
      if (!coverTouchTracking || e.touches.length !== 1) return;
      if (book.getAttribute('data-state') !== 'cover') return;
      const t = e.touches[0];
      const dx = t.clientX - coverTouchStartX;
      const dy = t.clientY - coverTouchStartY;
      if (Math.abs(dx) > Math.abs(dy) && e.cancelable) {
        e.preventDefault();
      }
    }, { passive: false });

    const resetCoverTouch = () => {
      coverTouchTracking = false;
      coverTouchStartX = 0;
      coverTouchStartY = 0;
    };
    coverEl.addEventListener('touchend', resetCoverTouch, { passive: true });
    coverEl.addEventListener('touchcancel', resetCoverTouch, { passive: true });

    // Block browser edge-swipe back/forward on mobile by capturing horizontal
    // gestures that start near the viewport edges.
    let edgeTracking = false;
    let edgeSwipeStartX = 0;
    let edgeSwipeStartY = 0;
    const EDGE_GUARD_PX = 28;

    function resetEdgeSwipe() {
      edgeTracking = false;
      edgeSwipeStartX = 0;
      edgeSwipeStartY = 0;
    }

    document.addEventListener('touchstart', (e) => {
      if (!mobileQuery.matches || e.touches.length !== 1) return;
      const t = e.touches[0];
      const x = t.clientX;
      const width = window.innerWidth || document.documentElement.clientWidth || 0;
      edgeTracking = x <= EDGE_GUARD_PX || x >= (width - EDGE_GUARD_PX);
      if (!edgeTracking) return;
      edgeSwipeStartX = x;
      edgeSwipeStartY = t.clientY;
    }, { passive: true, capture: true });

    document.addEventListener('touchmove', (e) => {
      if (!edgeTracking || e.touches.length !== 1) return;
      const t = e.touches[0];
      const dx = t.clientX - edgeSwipeStartX;
      const dy = t.clientY - edgeSwipeStartY;
      if (Math.abs(dx) > Math.abs(dy) && e.cancelable) {
        e.preventDefault();
      }
    }, { passive: false, capture: true });

    document.addEventListener('touchend', resetEdgeSwipe, { passive: true, capture: true });
    document.addEventListener('touchcancel', resetEdgeSwipe, { passive: true, capture: true });

    mobileQuery.addEventListener('change', rerenderByViewport);
    tabletQuery.addEventListener('change', rerenderByViewport);

    async function init() {
      await loadPortfolioData();
      renderCover();
    }

    init();
  </script>
</body>
</html>
