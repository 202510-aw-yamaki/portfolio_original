<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Content Editor</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --line: #d6d2c9;
      --text: #1f1f1f;
      --muted: #6c6a63;
      --accent: #c26a2e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }
    header {
      padding: 20px 24px;
      background: #efe8dc;
      border-bottom: 1px solid var(--line);
    }
    header h1 { margin: 0 0 6px; font-size: 20px; }
    header p { margin: 0; color: var(--muted); font-size: 14px; }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 24px;
    }
    section.panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }
    section.panel h2 { margin: 0 0 12px; font-size: 18px; }
    .group {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      background: #faf9f6;
    }
    .group h3 { margin: 0 0 8px; font-size: 16px; }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 8px 0 4px;
    }
    input[type="text"], input[type="url"], textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }
    textarea { min-height: 80px; resize: vertical; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      padding: 8px 14px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      background: #fff;
      color: var(--accent);
    }
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .chip-list label {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
    }
    .note { font-size: 12px; color: var(--muted); }
    .preview {
      width: 100%;
      min-height: 200px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ポートフォリオ用テキスト入力エディタ</h1>
    <p>入力後に「JSON保存」で <code>content.json</code> をダウンロードしてください。保存したJSONを <code>yh_portfolio</code> 直下に配置すると各ページに反映されます。</p>
  </header>

  <main>
    <section class="panel" id="profilePanel">
      <h2>1. プロフィール</h2>
      <div id="profileSections"></div>
    </section>

    <section class="panel" id="portfolioPanel">
      <h2>2. ポートフォリオ</h2>
      <div id="workList"></div>
      <div class="actions">
        <button type="button" id="addWorkBtn" class="secondary">追加で入力</button>
        <span class="note">最大6作品まで</span>
      </div>
    </section>

    <section class="panel" id="skillsPanel">
      <h2>3. スキル</h2>
      <h3>資格</h3>
      <div id="certList"></div>
      <div class="actions">
        <button type="button" id="addCertBtn" class="secondary">追加で入力</button>
      </div>

      <h3>ツール</h3>
      <div id="toolList"></div>
      <div class="actions">
        <button type="button" id="addToolBtn" class="secondary">追加で入力</button>
      </div>
    </section>

    <section class="panel">
      <h2>JSON出力</h2>
      <div class="actions">
        <button type="button" id="loadJsonBtn" class="secondary">JSON読込</button>
        <button type="button" id="saveJsonBtn">JSON保存</button>
        <span class="note">出力プレビューも更新されます。</span>
      </div>
      <input type="file" id="jsonFileInput" accept="application/json" style="display:none" />
      <label for="jsonPreview">プレビュー</label>
      <textarea id="jsonPreview" class="preview" readonly></textarea>
    </section>
  </main>

  <script>
    const PROFILE_KEYS = [
      {
        key: '概要',
        title: '概要',
        placeholders: [
          '例）氏名: 山田太郎 / 29歳 / 東京在住',
          '例）希望職種: フロントエンドエンジニア',
          '例）3行サマリー: UI/UX志向・迅速な試作・丁寧な運用'
        ],
        notePlaceholder: '補足メモ: 必要に応じて差し替えてください。'
      },
      {
        key: '経歴',
        title: '経歴',
        placeholders: [
          '例）製造業: 生産ライン改善に従事 (2年)',
          '例）店舗運営: 接客・売場企画を担当 (3年)',
          '例）転身: Web開発へシフトし現職でUI改善に従事'
        ],
        notePlaceholder: '補足メモ'
      },
      {
        key: '実績',
        title: '実績',
        placeholders: [
          '例）社内ポータルのUI刷新で離脱率20%改善',
          '例）受注管理画面のモバイル対応を主導',
          '例）LP A/BテストでCVR+15%'
        ],
        notePlaceholder: '補足メモ'
      },
      {
        key: '強み',
        title: '強み',
        placeholders: [
          '例）複雑な要件をビジュアルに整理',
          '例）アクセシビリティ配慮の実装',
          '例）デザイナー/企画との橋渡し'
        ],
        notePlaceholder: '補足メモ'
      },
      {
        key: '学習',
        title: '学習',
        placeholders: [
          '例）TypeScript + ReactでのUI開発',
          '例）SVG/Canvasでのインタラクション設計',
          '例）色彩・タイポグラフィ設計を継続学習'
        ],
        notePlaceholder: '例）資格: 色彩検定2級 / TOEIC780'
      },
      {
        key: '希望',
        title: '希望',
        placeholders: [
          '例）入社可能時期: 2024年6月以降',
          '例）勤務地: 首都圏 / リモート歓迎',
          '例）志向: 長期でUIを育てられる環境を希望'
        ],
        notePlaceholder: '例）働き方は柔軟に相談可能です。'
      }
    ];

    const TAG_OPTIONS = ['UI', 'Web', '実装', '設計', '業務', '分析', '運用', '改善', '標準化', 'CV改善'];

    const profileSections = document.getElementById('profileSections');
    const workList = document.getElementById('workList');
    const certList = document.getElementById('certList');
    const toolList = document.getElementById('toolList');
    const addWorkBtn = document.getElementById('addWorkBtn');
    const addCertBtn = document.getElementById('addCertBtn');
    const addToolBtn = document.getElementById('addToolBtn');
    const loadJsonBtn = document.getElementById('loadJsonBtn');
    const jsonFileInput = document.getElementById('jsonFileInput');
    const saveJsonBtn = document.getElementById('saveJsonBtn');
    const jsonPreview = document.getElementById('jsonPreview');

    function createProfileSection(section) {
      const wrap = document.createElement('div');
      wrap.className = 'group';
      wrap.dataset.key = section.key;
      wrap.innerHTML = `
        <h3>${section.title}</h3>
        <div class="row-3">
          <div>
            <label>1行目</label>
            <input type="text" data-row="0" placeholder="${section.placeholders[0]}" />
          </div>
          <div>
            <label>2行目</label>
            <input type="text" data-row="1" placeholder="${section.placeholders[1]}" />
          </div>
          <div>
            <label>3行目</label>
            <input type="text" data-row="2" placeholder="${section.placeholders[2]}" />
          </div>
        </div>
        <label>補足メモ</label>
        <textarea data-note placeholder="${section.notePlaceholder}"></textarea>
      `;
      return wrap;
    }

    function createTagSelector() {
      const box = document.createElement('div');
      box.className = 'chip-list';
      TAG_OPTIONS.forEach((tag) => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" value="${tag}" />${tag}`;
        box.appendChild(label);
      });
      return box;
    }

    function createWorkGroup(index) {
      const group = document.createElement('div');
      group.className = 'group';
      group.dataset.type = 'work';
      group.innerHTML = `
        <h3>作品 ${index + 1}</h3>
        <label>作品名</label>
        <input type="text" data-field="title" placeholder="例）作品A（仮）" />
        <label>1行説明</label>
        <input type="text" data-field="short" placeholder="例）UI改善を中心に、導線整理と視認性向上を行った事例です。" />
        <label>UIチップ選択</label>
      `;
      const chipBox = createTagSelector();
      chipBox.dataset.field = 'tags';
      group.appendChild(chipBox);
      const custom = document.createElement('div');
      custom.innerHTML = `
        <label>チップ自由入力(カンマ区切り)</label>
        <input type="text" data-field="tagsCustom" placeholder="例）UI,設計,改善" />
      `;
      group.appendChild(custom);
      const detail = document.createElement('div');
      detail.innerHTML = `
        <label>詳細説明</label>
        <textarea data-field="detail" placeholder="例）背景・課題\n- 〜〜\n\n対応\n- 〜〜\n\n結果\n- 〜〜"></textarea>
        <div class="row">
          <div>
            <label>リンク① 作品紹介ページ</label>
            <input type="url" data-field="pageUrl" placeholder="https://" />
          </div>
          <div>
            <label>リンク② GitHub/ダウンロード</label>
            <input type="url" data-field="downloadUrl" placeholder="https://" />
          </div>
        </div>
      `;
      group.appendChild(detail);
      return group;
    }

    function createCertGroup(index) {
      const group = document.createElement('div');
      group.className = 'group';
      group.dataset.type = 'cert';
      group.innerHTML = `
        <h3>資格 ${index + 1}</h3>
        <label>資格名</label>
        <input type="text" data-field="name" placeholder="例）資格名A" />
        <label>何の資格か</label>
        <input type="text" data-field="desc" placeholder="例）◯◯検定" />
        <label>取得年月日</label>
        <input type="text" data-field="date" placeholder="例）2025/12/24" />
        <label>主催</label>
        <input type="text" data-field="org" placeholder="例）◯◯協会" />
      `;
      return group;
    }

    function createToolGroup(index) {
      const group = document.createElement('div');
      group.className = 'group';
      group.dataset.type = 'tool';
      group.innerHTML = `
        <h3>ツール ${index + 1}</h3>
        <label>ツール名</label>
        <input type="text" data-field="name" placeholder="例）ツール名A" />
        <label>どれくらい使えるか</label>
        <input type="text" data-field="levelText" placeholder="例）日常使い / 学習中 / 実務経験あり" />
        <label>★評価 (1〜3)</label>
        <div class="chip-list" data-field="stars">
          <label><input type="radio" name="stars-${index}" value="1" />★1</label>
          <label><input type="radio" name="stars-${index}" value="2" />★2</label>
          <label><input type="radio" name="stars-${index}" value="3" />★3</label>
        </div>
        <label>系統</label>
        <input type="text" data-field="category" placeholder="例）制作補助 / 開発 / デザイン / 学習" />
      `;
      return group;
    }

    function addWork() {
      const count = workList.querySelectorAll('[data-type="work"]').length;
      if (count >= 6) return;
      workList.appendChild(createWorkGroup(count));
      refreshStarNames();
    }

    function addCert() {
      const count = certList.querySelectorAll('[data-type="cert"]').length;
      certList.appendChild(createCertGroup(count));
    }

    function addTool() {
      const count = toolList.querySelectorAll('[data-type="tool"]').length;
      toolList.appendChild(createToolGroup(count));
      refreshStarNames();
    }

    function collectProfile() {
      return PROFILE_KEYS.map((section) => {
        const el = profileSections.querySelector(`[data-key="${section.key}"]`);
        const rows = Array.from(el.querySelectorAll('input[data-row]')).map((input) => input.value.trim());
        const note = el.querySelector('[data-note]').value.trim();
        return { key: section.key, rows, note };
      });
    }

    function collectWorks() {
      const works = [];
      workList.querySelectorAll('[data-type="work"]').forEach((el, index) => {
        const title = el.querySelector('[data-field="title"]').value.trim();
        const short = el.querySelector('[data-field="short"]').value.trim();
        const detail = el.querySelector('[data-field="detail"]').value.trim();
        const pageUrl = el.querySelector('[data-field="pageUrl"]').value.trim();
        const downloadUrl = el.querySelector('[data-field="downloadUrl"]').value.trim();
        const selectedTags = Array.from(el.querySelectorAll('[data-field="tags"] input:checked')).map((i) => i.value);
        const customTagsRaw = el.querySelector('[data-field="tagsCustom"]').value;
        const customTags = customTagsRaw.split(',').map((t) => t.trim()).filter(Boolean);
        const tags = Array.from(new Set([...selectedTags, ...customTags]));

        const isEmpty = !title && !short && !detail && !pageUrl && !downloadUrl && tags.length === 0;
        if (isEmpty) return;

        works.push({
          id: `work-${String(index + 1).padStart(2, '0')}`,
          title,
          short,
          tags,
          detail,
          pageUrl,
          downloadUrl
        });
      });
      return works;
    }

    function collectCerts() {
      const certs = [];
      certList.querySelectorAll('[data-type="cert"]').forEach((el) => {
        const name = el.querySelector('[data-field="name"]').value.trim();
        const desc = el.querySelector('[data-field="desc"]').value.trim();
        const date = el.querySelector('[data-field="date"]').value.trim();
        const org = el.querySelector('[data-field="org"]').value.trim();
        const isEmpty = !name && !desc && !date && !org;
        if (isEmpty) return;
        certs.push({ name, desc, date, org });
      });
      return certs;
    }

    function collectTools() {
      const tools = [];
      toolList.querySelectorAll('[data-type="tool"]').forEach((el, index) => {
        const name = el.querySelector('[data-field="name"]').value.trim();
        const levelText = el.querySelector('[data-field="levelText"]').value.trim();
        const starsNode = el.querySelector(`[name="stars-${index}"]:checked`);
        const stars = starsNode ? Number(starsNode.value) : 0;
        const category = el.querySelector('[data-field="category"]').value.trim();
        const isEmpty = !name && !levelText && !stars && !category;
        if (isEmpty) return;
        tools.push({ name, levelText, stars, category });
      });
      return tools;
    }

    function generateJson() {
      const works = collectWorks();
      const data = {
        profile: { sections: collectProfile() },
        portfolio: {
          works,
          featured: works.slice(0, 3).map((w) => w.id)
        },
        skills: {
          certs: collectCerts(),
          tools: collectTools()
        }
      };
      const json = JSON.stringify(data, null, 2);
      jsonPreview.value = json;
      return json;
    }

    function downloadJson() {
      const json = generateJson();
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'content.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function refreshStarNames() {
      toolList.querySelectorAll('[data-type="tool"]').forEach((el, index) => {
        el.querySelectorAll('input[type="radio"]').forEach((input) => {
          input.name = `stars-${index}`;
        });
      });
    }

    function fillProfile(sections) {
      if (!Array.isArray(sections)) return;
      sections.forEach((sec) => {
        const wrap = profileSections.querySelector(`[data-key="${sec.key}"]`);
        if (!wrap) return;
        if (Array.isArray(sec.rows)) {
          wrap.querySelectorAll('input[data-row]').forEach((input, i) => {
            input.value = sec.rows[i] || '';
          });
        }
        const note = wrap.querySelector('[data-note]');
        if (note) note.value = sec.note || '';
      });
    }

    function fillWorks(works) {
      if (!Array.isArray(works)) return;
      workList.innerHTML = '';
      works.slice(0, 6).forEach((work, index) => {
        const group = createWorkGroup(index);
        group.querySelector('[data-field="title"]').value = work.title || '';
        group.querySelector('[data-field="short"]').value = work.short || '';
        group.querySelector('[data-field="detail"]').value = work.detail || '';
        group.querySelector('[data-field="pageUrl"]').value = work.pageUrl || '';
        group.querySelector('[data-field="downloadUrl"]').value = work.downloadUrl || '';

        const tagSet = new Set(Array.isArray(work.tags) ? work.tags.map((t) => String(t)) : []);
        group.querySelectorAll('[data-field="tags"] input[type="checkbox"]').forEach((cb) => {
          cb.checked = tagSet.has(cb.value);
          if (cb.checked) tagSet.delete(cb.value);
        });
        if (tagSet.size) {
          group.querySelector('[data-field="tagsCustom"]').value = Array.from(tagSet).join(',');
        }
        workList.appendChild(group);
      });
      if (workList.children.length === 0) {
        addWork();
        addWork();
      }
    }

    function fillCerts(certs) {
      if (!Array.isArray(certs)) return;
      certList.innerHTML = '';
      certs.forEach((c, index) => {
        const group = createCertGroup(index);
        group.querySelector('[data-field="name"]').value = c.name || '';
        group.querySelector('[data-field="desc"]').value = c.desc || '';
        group.querySelector('[data-field="date"]').value = c.date || '';
        group.querySelector('[data-field="org"]').value = c.org || '';
        certList.appendChild(group);
      });
      if (certList.children.length === 0) {
        addCert();
        addCert();
      }
    }

    function fillTools(tools) {
      if (!Array.isArray(tools)) return;
      toolList.innerHTML = '';
      tools.forEach((t, index) => {
        const group = createToolGroup(index);
        group.querySelector('[data-field="name"]').value = t.name || '';
        group.querySelector('[data-field="levelText"]').value = t.levelText || '';
        const stars = Number(t.stars) || 0;
        if (stars >= 1 && stars <= 3) {
          const radio = group.querySelector(`input[type="radio"][value="${stars}"]`);
          if (radio) radio.checked = true;
        }
        group.querySelector('[data-field="category"]').value = t.category || '';
        toolList.appendChild(group);
      });
      refreshStarNames();
      if (toolList.children.length === 0) {
        addTool();
        addTool();
      }
    }

    function loadJsonObject(data) {
      fillProfile(data?.profile?.sections);
      fillWorks(data?.portfolio?.works);
      fillCerts(data?.skills?.certs);
      fillTools(data?.skills?.tools);
      generateJson();
    }

    function handleJsonFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(String(reader.result || '{}'));
          loadJsonObject(data);
        } catch (e) {
          alert('JSONの読み込みに失敗しました。');
        }
      };
      reader.readAsText(file);
    }

    PROFILE_KEYS.forEach((section) => profileSections.appendChild(createProfileSection(section)));
    addWork();
    addWork();
    addCert();
    addCert();
    addTool();
    addTool();
    refreshStarNames();

    addWorkBtn.addEventListener('click', addWork);
    addCertBtn.addEventListener('click', addCert);
    addToolBtn.addEventListener('click', addTool);
    loadJsonBtn.addEventListener('click', () => jsonFileInput.click());
    jsonFileInput.addEventListener('change', (e) => handleJsonFile(e.target.files[0]));
    saveJsonBtn.addEventListener('click', downloadJson);
    generateJson();
  </script>
</body>
</html>
