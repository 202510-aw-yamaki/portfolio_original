<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Content Editor</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --line: #d6d2c9;
      --text: #1f1f1f;
      --muted: #6c6a63;
      --accent: #c26a2e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }
    header {
      padding: 20px 24px;
      background: #efe8dc;
      border-bottom: 1px solid var(--line);
    }
    header h1 { margin: 0 0 6px; font-size: 20px; }
    header p { margin: 0; color: var(--muted); font-size: 14px; }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 24px;
    }
    section.panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }
    section.panel h2 { margin: 0 0 12px; font-size: 18px; }
    .group {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      background: #faf9f6;
    }
    .group h3 { margin: 0 0 8px; font-size: 16px; }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 8px 0 4px;
    }
    input[type="text"], input[type="url"], textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }
    textarea { min-height: 80px; resize: vertical; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      padding: 8px 14px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      background: #fff;
      color: var(--accent);
    }
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .chip-list label {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
    }
    .note { font-size: 12px; color: var(--muted); }
    .preview {
      width: 100%;
      min-height: 200px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ポートフォリオ用テキスト入力エディタ</h1>
    <p>入力後に「JSON保存」で <code>content.json</code> をダウンロードしてください。保存したJSONを <code>yh_portfolio</code> 直下に配置すると各ページに反映されます。</p>
  </header>

  <main>
    <section class="panel" id="profilePanel">
      <h2>1. プロフィール</h2>
      <div id="profileSections"></div>
    </section>

    <section class="panel" id="portfolioPanel">
      <h2>2. ポートフォリオ</h2>
      <div id="workList"></div>
      <div class="actions">
        <button type="button" id="addWorkBtn" class="secondary">追加で入力</button>
        <span class="note">最大6作品まで</span>
      </div>
    </section>

    <section class="panel" id="skillsPanel">
      <h2>3. スキル</h2>
      <h3>資格</h3>
      <div id="certList"></div>
      <div class="actions">
        <button type="button" id="addCertBtn" class="secondary">追加で入力</button>
      </div>

      <h3>ツール</h3>
      <div id="toolList"></div>
      <div class="actions">
        <button type="button" id="addToolBtn" class="secondary">追加で入力</button>
      </div>
    </section>

    <section class="panel">
      <h2>JSON出力</h2>
      <div class="actions">
        <button type="button" id="saveJsonBtn">JSON保存</button>
        <span class="note">出力プレビューも更新されます。</span>
      </div>
      <label for="jsonPreview">プレビュー</label>
      <textarea id="jsonPreview" class="preview" readonly></textarea>
    </section>
  </main>

  <script>
    const PROFILE_KEYS = [
      { key: '概要', title: '概要' },
      { key: '経歴', title: '経歴' },
      { key: '実績', title: '実績' },
      { key: '強み', title: '強み' },
      { key: '学習', title: '学習' },
      { key: '希望', title: '希望' }
    ];

    const TAG_OPTIONS = ['UI', 'Web', '実装', '設計', '業務', '分析', '運用', '改善', '標準化', 'CV改善'];

    const profileSections = document.getElementById('profileSections');
    const workList = document.getElementById('workList');
    const certList = document.getElementById('certList');
    const toolList = document.getElementById('toolList');
    const addWorkBtn = document.getElementById('addWorkBtn');
    const addCertBtn = document.getElementById('addCertBtn');
    const addToolBtn = document.getElementById('addToolBtn');
    const saveJsonBtn = document.getElementById('saveJsonBtn');
    const jsonPreview = document.getElementById('jsonPreview');

    function createProfileSection(section) {
      const wrap = document.createElement('div');
      wrap.className = 'group';
      wrap.dataset.key = section.key;
      wrap.innerHTML = `
        <h3>${section.title}</h3>
        <div class="row-3">
          <div>
            <label>1行目</label>
            <input type="text" data-row="0" />
          </div>
          <div>
            <label>2行目</label>
            <input type="text" data-row="1" />
          </div>
          <div>
            <label>3行目</label>
            <input type="text" data-row="2" />
          </div>
        </div>
        <label>補足メモ</label>
        <textarea data-note></textarea>
      `;
      return wrap;
    }

    function createTagSelector() {
      const box = document.createElement('div');
      box.className = 'chip-list';
      TAG_OPTIONS.forEach((tag) => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" value="${tag}" />${tag}`;
        box.appendChild(label);
      });
      return box;
    }

    function createWorkGroup(index) {
      const group = document.createElement('div');
      group.className = 'group';
      group.dataset.type = 'work';
      group.innerHTML = `
        <h3>作品 ${index + 1}</h3>
        <label>作品名</label>
        <input type="text" data-field="title" />
        <label>1行説明</label>
        <input type="text" data-field="short" />
        <label>UIチップ選択</label>
      `;
      const chipBox = createTagSelector();
      chipBox.dataset.field = 'tags';
      group.appendChild(chipBox);
      const custom = document.createElement('div');
      custom.innerHTML = `
        <label>チップ自由入力(カンマ区切り)</label>
        <input type="text" data-field="tagsCustom" />
      `;
      group.appendChild(custom);
      const detail = document.createElement('div');
      detail.innerHTML = `
        <label>詳細説明</label>
        <textarea data-field="detail"></textarea>
        <div class="row">
          <div>
            <label>リンク① 作品紹介ページ</label>
            <input type="url" data-field="pageUrl" placeholder="https://" />
          </div>
          <div>
            <label>リンク② GitHub/ダウンロード</label>
            <input type="url" data-field="downloadUrl" placeholder="https://" />
          </div>
        </div>
      `;
      group.appendChild(detail);
      return group;
    }

    function createCertGroup(index) {
      const group = document.createElement('div');
      group.className = 'group';
      group.dataset.type = 'cert';
      group.innerHTML = `
        <h3>資格 ${index + 1}</h3>
        <label>資格名</label>
        <input type="text" data-field="name" />
        <label>何の資格か</label>
        <input type="text" data-field="desc" />
        <label>取得年月日</label>
        <input type="text" data-field="date" placeholder="YYYY/MM/DD" />
        <label>主催</label>
        <input type="text" data-field="org" />
      `;
      return group;
    }

    function createToolGroup(index) {
      const group = document.createElement('div');
      group.className = 'group';
      group.dataset.type = 'tool';
      group.innerHTML = `
        <h3>ツール ${index + 1}</h3>
        <label>ツール名</label>
        <input type="text" data-field="name" />
        <label>どれくらい使えるか</label>
        <input type="text" data-field="levelText" />
        <label>★評価 (1〜3)</label>
        <div class="chip-list" data-field="stars">
          <label><input type="radio" name="stars-${index}" value="1" />★1</label>
          <label><input type="radio" name="stars-${index}" value="2" />★2</label>
          <label><input type="radio" name="stars-${index}" value="3" />★3</label>
        </div>
        <label>系統</label>
        <input type="text" data-field="category" />
      `;
      return group;
    }

    function addWork() {
      const count = workList.querySelectorAll('[data-type="work"]').length;
      if (count >= 6) return;
      workList.appendChild(createWorkGroup(count));
    }

    function addCert() {
      const count = certList.querySelectorAll('[data-type="cert"]').length;
      certList.appendChild(createCertGroup(count));
    }

    function addTool() {
      const count = toolList.querySelectorAll('[data-type="tool"]').length;
      toolList.appendChild(createToolGroup(count));
    }

    function collectProfile() {
      return PROFILE_KEYS.map((section) => {
        const el = profileSections.querySelector(`[data-key="${section.key}"]`);
        const rows = Array.from(el.querySelectorAll('input[data-row]')).map((input) => input.value.trim());
        const note = el.querySelector('[data-note]').value.trim();
        return { key: section.key, rows, note };
      });
    }

    function collectWorks() {
      const works = [];
      workList.querySelectorAll('[data-type="work"]').forEach((el, index) => {
        const title = el.querySelector('[data-field="title"]').value.trim();
        const short = el.querySelector('[data-field="short"]').value.trim();
        const detail = el.querySelector('[data-field="detail"]').value.trim();
        const pageUrl = el.querySelector('[data-field="pageUrl"]').value.trim();
        const downloadUrl = el.querySelector('[data-field="downloadUrl"]').value.trim();
        const selectedTags = Array.from(el.querySelectorAll('[data-field="tags"] input:checked')).map((i) => i.value);
        const customTagsRaw = el.querySelector('[data-field="tagsCustom"]').value;
        const customTags = customTagsRaw.split(',').map((t) => t.trim()).filter(Boolean);
        const tags = Array.from(new Set([...selectedTags, ...customTags]));

        const isEmpty = !title && !short && !detail && !pageUrl && !downloadUrl && tags.length === 0;
        if (isEmpty) return;

        works.push({
          id: `work-${String(index + 1).padStart(2, '0')}`,
          title,
          short,
          tags,
          detail,
          pageUrl,
          downloadUrl
        });
      });
      return works;
    }

    function collectCerts() {
      const certs = [];
      certList.querySelectorAll('[data-type="cert"]').forEach((el) => {
        const name = el.querySelector('[data-field="name"]').value.trim();
        const desc = el.querySelector('[data-field="desc"]').value.trim();
        const date = el.querySelector('[data-field="date"]').value.trim();
        const org = el.querySelector('[data-field="org"]').value.trim();
        const isEmpty = !name && !desc && !date && !org;
        if (isEmpty) return;
        certs.push({ name, desc, date, org });
      });
      return certs;
    }

    function collectTools() {
      const tools = [];
      toolList.querySelectorAll('[data-type="tool"]').forEach((el, index) => {
        const name = el.querySelector('[data-field="name"]').value.trim();
        const levelText = el.querySelector('[data-field="levelText"]').value.trim();
        const starsNode = el.querySelector(`[name="stars-${index}"]:checked`);
        const stars = starsNode ? Number(starsNode.value) : 0;
        const category = el.querySelector('[data-field="category"]').value.trim();
        const isEmpty = !name && !levelText && !stars && !category;
        if (isEmpty) return;
        tools.push({ name, levelText, stars, category });
      });
      return tools;
    }

    function generateJson() {
      const works = collectWorks();
      const data = {
        profile: { sections: collectProfile() },
        portfolio: {
          works,
          featured: works.slice(0, 3).map((w) => w.id)
        },
        skills: {
          certs: collectCerts(),
          tools: collectTools()
        }
      };
      const json = JSON.stringify(data, null, 2);
      jsonPreview.value = json;
      return json;
    }

    function downloadJson() {
      const json = generateJson();
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'content.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    PROFILE_KEYS.forEach((section) => profileSections.appendChild(createProfileSection(section)));
    addWork();
    addWork();
    addCert();
    addCert();
    addTool();
    addTool();

    addWorkBtn.addEventListener('click', addWork);
    addCertBtn.addEventListener('click', addCert);
    addToolBtn.addEventListener('click', addTool);
    saveJsonBtn.addEventListener('click', downloadJson);
  </script>
</body>
</html>
